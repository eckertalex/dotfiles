[General]
hotkey=Ctrl+Space
incrementalSort=true
showTray=true
terminal=kitty --config $HOME/.config/kitty/minimal-kitty.conf

[org.albert.extension.applications]
enabled=true
fuzzy=true

[org.albert.extension.calculator]
enabled=true

[org.albert.extension.files]
enabled=true
filters=inode/directory, application/*, image/*
fuzzy=true
indexhidden=true

[org.albert.extension.python]
enabled=true
enabled_modules=google_translate, units, unicode_emoji

[org.albert.extension.terminal]
enabled=true

[org.albert.extension.websearch]
enabled=true

[org.albert.frontend.widgetboxmodel]
alwaysOnTop=true
clearOnHide=false
displayIcons=true
displayScrollbar=false
displayShadow=true
hideOnClose=false
hideOnFocusLoss=true
itemCount=5
showCentered=true
theme=NightOwl
windowPosition=@Point(416 463)
